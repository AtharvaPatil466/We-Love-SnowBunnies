version: "3.9"

services:
  neo4j:
    image: neo4j:5.26
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/change-me
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      MODEL_CHECKPOINT_PATH: /workspace/ml/checkpoints/fraudsense_gat.pt
      GRAPH_FOCUS_USER_ID: user_01
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: change-me
    volumes:
      - .:/workspace
    working_dir: /workspace/backend
    depends_on:
      - neo4j

  web:
    image: node:20
    working_dir: /workspace/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
    depends_on:
      - backend

volumes:
  neo4j_data:
